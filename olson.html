<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olson Calculator - Tom Danley</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --cyan: #00e5ff;
            --cyan-dim: rgba(0, 229, 255, 0.2);
            --dark-bg: #030a10;
            --panel-bg: rgba(3, 10, 16, 0.6);
            --panel-border: rgba(0, 229, 255, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        #three-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--cyan);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            padding: 10px 20px;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .back-btn:hover {
            background: var(--cyan-dim);
            box-shadow: 0 0 15px var(--cyan-dim);
        }

        .main-container {
            position: relative;
            z-index: 1;
            padding: 80px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--cyan);
            text-shadow: 0 0 20px var(--cyan-dim);
            margin-bottom: 40px;
            text-align: center;
        }

        .calculator-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 800px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px var(--cyan-dim);
        }

        .panel-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--cyan-dim);
            padding-bottom: 10px;
        }

    </style>
</head>
<body>
    <canvas id="three-bg"></canvas>
    
    <a href="index.html" class="back-btn">← BACK</a>

    <div class="main-container">
        <h1 class="title">HARRY OLSON SERIES</h1>
        
        <div class="calculator-panel">
            <div class="panel-header">Acoustic Calculations - Stage 1</div>
            <p>Calculation module in development, based on the book Elements of Acoustical Engineering (1957) by Harry F. Olson.</p>
            <!-- Input and output fields will go here -->
        </div>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Background Animation (Similar to index.html to maintain theme)
        const canvas = document.getElementById('three-bg');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;

        const geo = new THREE.IcosahedronGeometry(3, 1);
        const mat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true, transparent: true, opacity: 0.08 });
        const meshes = [];
        
        for (let i = 0; i < 15; i++) {
            const m = new THREE.Mesh(geo, mat.clone());
            m.position.set((Math.random()-0.5)*60, (Math.random()-0.5)*35, (Math.random()-0.5)*20-10);
            m.scale.setScalar(0.4 + Math.random()*1.8);
            m.userData = { 
                rx: (Math.random()-0.5)*0.005, 
                ry: (Math.random()-0.5)*0.005,
                floatSpeed: Math.random() * 0.02
            };
            scene.add(m);
            meshes.push(m);
        }

        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            meshes.forEach((m, i) => {
                m.rotation.x += m.userData.rx;
                m.rotation.y += m.userData.ry;
                m.position.y += Math.sin(time + i) * m.userData.floatSpeed;
            });
            
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
    <script src="olson-engine.js"></script>
</body>
</html>
